<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVI Research — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🧭</span>
                    <span class="logo-text">NAVI</span>
                </div>
                <span class="version">v1.0</span>
            </div>
            <nav class="nav">
                <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
                    <span class="nav-icon">📊</span><span>대시보드</span>
                </a>
                <a href="#" class="nav-item" data-page="sessions" id="nav-sessions">
                    <span class="nav-icon">📚</span><span>세션 목록</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="workflow-badge">
                    <span class="badge-dot"></span>
                    <span>7 Workflows Active</span>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main">
            <header class="header">
                <h1 class="page-title" id="page-title">대시보드</h1>
            </header>

            <!-- Dashboard -->
            <div class="page active" id="page-dashboard">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">📄</div>
                        <div class="stat-info">
                            <span class="stat-value" id="total-sessions">0</span>
                            <span class="stat-label">총 세션</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">📝</div>
                        <div class="stat-info">
                            <span class="stat-value" id="total-words">0</span>
                            <span class="stat-label">총 단어 수</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">📚</div>
                        <div class="stat-info">
                            <span class="stat-value" id="total-citations">0</span>
                            <span class="stat-label">수집 논문</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">✅</div>
                        <div class="stat-info">
                            <span class="stat-value" id="avg-ptcs">0%</span>
                            <span class="stat-label">평균 PTCS</span>
                        </div>
                    </div>
                </div>

                <!-- Recent + QA -->
                <div class="card">
                    <div class="card-header">
                        <h2>최근 시뮬레이션</h2>
                        <a href="#" class="link" id="view-all">전체 보기 →</a>
                    </div>
                    <div id="recent-sessions"></div>
                </div>

                <div class="card">
                    <div class="card-header"><h2>QA 현황</h2></div>
                    <div class="qa-dashboard" id="qa-dashboard"></div>
                </div>
            </div>

            <!-- Sessions -->
            <div class="page" id="page-sessions">
                <div class="card">
                    <div class="card-header"><h2>전체 세션</h2></div>
                    <div id="all-sessions"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
