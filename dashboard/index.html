<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVI Research</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --bg-card: #161b22;
            --bg-hover: #1c2333;
            --text: #e6edf3;
            --text-sub: #8b949e;
            --accent: #7c8aff;
            --accent-dim: rgba(124, 138, 255, 0.12);
            --border: #30363d;
            --green: #3fb950;
            --orange: #d29922;
            --red: #f85149;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

        /* Header */
        .site-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 32px; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(12px); z-index: 100;
        }
        .site-logo { display: flex; align-items: center; gap: 10px; }
        .site-logo span:first-child { font-size: 24px; }
        .site-logo span:last-child { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #7c8aff, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn {
            display: none; background: none; border: 1px solid var(--border);
            color: var(--text-sub); padding: 6px 14px; border-radius: 8px;
            cursor: pointer; font-size: 13px; font-family: inherit;
            transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }
        .back-btn.visible { display: inline-flex; align-items: center; gap: 6px; }

        /* Container */
        .container { max-width: 800px; margin: 0 auto; padding: 32px 20px; }

        /* Session List */
        .session-list { display: flex; flex-direction: column; gap: 16px; }
        .session-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .session-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        .session-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .session-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: var(--text-sub); margin-bottom: 12px; }
        .session-meta span { display: flex; align-items: center; gap: 4px; }
        .session-tags { display: flex; gap: 8px; }
        .tag {
            font-size: 11px; padding: 3px 10px; border-radius: 20px;
            font-weight: 500;
        }
        .tag-ptcs-high { background: rgba(63, 185, 80, 0.15); color: var(--green); }
        .tag-ptcs-mid { background: rgba(210, 153, 34, 0.15); color: var(--orange); }
        .tag-type { background: var(--accent-dim); color: var(--accent); }
        .tag-lang { background: rgba(139, 148, 158, 0.15); color: var(--text-sub); }

        /* Article View */
        .article-view { display: none; }
        .article-view.active { display: block; }
        .session-list-view.hidden { display: none; }

        .article-header {
            border-bottom: 1px solid var(--border); padding-bottom: 24px; margin-bottom: 32px;
        }
        .article-header h1 { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 700; line-height: 1.4; margin-bottom: 12px; }
        .article-header .meta { font-size: 13px; color: var(--text-sub); display: flex; flex-wrap: wrap; gap: 16px; }

        .article-body {
            font-family: 'Noto Serif KR', 'Inter', serif;
            font-size: 16px; line-height: 1.9; color: #c9d1d9;
        }
        .article-body h2 {
            font-size: 22px; font-weight: 700; margin: 40px 0 16px;
            padding-bottom: 8px; border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        .article-body h3 { font-size: 18px; font-weight: 600; margin: 28px 0 12px; color: var(--text); }
        .article-body p { margin-bottom: 16px; }
        .article-body ul, .article-body ol { margin: 12px 0 16px 24px; }
        .article-body li { margin-bottom: 6px; }
        .article-body strong { color: var(--text); }
        .article-body blockquote {
            border-left: 3px solid var(--accent); padding: 12px 20px;
            margin: 16px 0; background: var(--accent-dim); border-radius: 0 8px 8px 0;
            font-style: italic; color: var(--text-sub);
        }
        .article-body code {
            background: var(--bg-hover); padding: 2px 6px; border-radius: 4px;
            font-size: 14px;
        }
        .article-body img {
            max-width: 100%; border-radius: 8px; margin: 20px 0;
            border: 1px solid var(--border);
        }
        .article-body .caption { text-align: center; font-size: 13px; color: var(--text-sub); font-style: italic; margin-top: -12px; margin-bottom: 20px; }

        /* References */
        .references { margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border); }
        .references h2 { font-size: 18px; margin-bottom: 16px; border: none; }
        .references ol { font-size: 14px; color: var(--text-sub); line-height: 1.8; }

        /* Empty */
        .empty { text-align: center; padding: 80px 20px; color: var(--text-sub); }
        .empty-icon { font-size: 48px; margin-bottom: 16px; display: block; }

        @media (max-width: 640px) {
            .site-header { padding: 12px 16px; }
            .container { padding: 20px 16px; }
            .article-header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-logo">
            <span>🧭</span>
            <span>NAVI Research</span>
        </div>
        <button class="back-btn" id="back-btn" onclick="showList()">← 목록으로</button>
    </header>

    <div class="container">
        <!-- Session List -->
        <div class="session-list-view" id="list-view">
            <div class="session-list" id="session-list"></div>
        </div>

        <!-- Article Reader -->
        <div class="article-view" id="article-view">
            <div class="article-header" id="article-header"></div>
            <div class="article-body" id="article-body"></div>
        </div>
    </div>

    <script>
    const SESSIONS = [
        {
            id: 1,
            title: '미래 기술 혁신이 사회 구조에 미치는 영향',
            subtitle: 'AI, 6G, 바이오 기술을 중심으로',
            date: '2026-03-13',
            type: 'Research Paper',
            lang: '한국어',
            words: 1294,
            citations: 8,
            ptcs: 78,
            diagrams: 1,
            author: 'NAVI AI',
            abstract: '본 연구는 인공지능(AI), 6G 통신, 바이오 기술 등 미래 핵심 기술이 사회 구조에 미치는 영향을 다층적으로 분석한다.',
            sections: [
                { heading: '1. 서론', content: `21세기 기술 혁신의 속도는 전례 없는 수준에 이르렀다. 인공지능(AI), 사물인터넷(IoT), 6G 통신, 양자컴퓨팅, 바이오 기술 등 파괴적 기술이 동시다발적으로 발전하면서, 이들이 사회 구조에 미치는 영향은 과거 어떤 산업 혁명보다도 광범위하고 심대할 것으로 전망된다.\n\n특히 AI 기술은 의료 진단, 자율주행, 금융 분석, 교육 개인화 등 거의 모든 산업 분야에 침투하고 있으며, 2030년까지 전 세계 GDP의 14%를 추가로 창출할 것으로 예측된다 (Dhar et al., 2024).` },
                { heading: '2. 기술 동인 분석', content: `<h3>2.1 인공지능과 자동화</h3>\n<p>AI 기술의 발전은 크게 세 가지 축으로 진행되고 있다. 첫째, <strong>대규모 언어 모델(LLM)</strong>의 등장으로 자연어 처리, 코드 생성, 과학적 추론 등의 영역에서 인간 수준의 성능이 달성되고 있다. 둘째, <strong>자율 에이전트</strong> 기술은 AI가 단순 응답을 넘어 자율적으로 행동하는 단계로 진화하고 있다.</p>\n<h3>2.2 6G 통신과 초연결 사회</h3>\n<p>6G 통신 기술은 테라헤르츠(THz) 대역을 활용하여 1Tbps 이상의 전송 속도를 구현하고, 0.1ms 이하의 초저지연을 달성할 것으로 전망된다 (You et al., 2023).</p>\n<h3>2.3 바이오 기술과 정밀 의학</h3>\n<p>유전체 편집(CRISPR), mRNA 백신 플랫폼, AI 기반 신약 개발 등의 바이오 기술은 정밀 의학의 시대를 열고 있다.</p>` },
                { heading: '3. 사회적 영향 분석', content: `<h3>3.1 의료 및 웰빙</h3>\n<p>AI 기반 의료 시스템은 진단 정확도 향상, 개인 맞춤 치료, 의료 접근성 개선의 세 가지 차원에서 혁신을 가져오고 있다.</p>\n<h3>3.2 노동 시장과 경제</h3>\n<p>OECD 추정에 따르면 선진국 일자리의 약 14%가 자동화에 의해 직접적으로 대체될 위험에 처해 있으며, 추가 32%가 상당한 수준의 변화를 겪을 것으로 예상된다.</p>\n<h3>3.3 교육과 역량</h3>\n<p>디지털 전환 시대의 교육은 "무엇을 아는가"에서 "어떻게 배우는가"로의 패러다임 전환을 요구한다.</p>` },
                { heading: '4. 기술-사회 역학 프레임워크', content: `본 연구는 미래 기술의 사회적 영향을 체계적으로 분석하기 위한 "기술-사회 역학 프레임워크"를 제안한다.\n\n이 프레임워크는 세 가지 기둥으로 구성된다:\n<ul>\n<li><strong>기술 동인</strong> — AI, 6G, 바이오 기술, 양자컴퓨팅</li>\n<li><strong>사회 영향 영역</strong> — 의료, 노동, 교육, 거버넌스, 환경</li>\n<li><strong>정책 대응</strong> — 규제, 디지털 리터러시, 윤리 프레임워크, 국제 협력</li>\n</ul>` },
                { heading: '5. 결론 및 제언', content: `AI와 자동화는 노동 시장의 구조적 변화를 촉발하되, 적절한 재교육 시스템이 수반될 경우 순고용 효과는 긍정적일 수 있다. 6G와 초연결 기술은 의료·교육 접근성을 혁신적으로 개선할 잠재력을 보유하나, 디지털 격차 확대의 위험도 동시에 존재한다.\n\n향후 연구에서는 개별 기술 간 상호작용(convergence) 효과에 대한 정량적 분석이 필요하다.` },
            ],
            references: [
                'Burton, M.J., et al. (2021). The Lancet Global Health Commission on Global Eye Health. <em>The Lancet Global Health</em>, 9(4).',
                'Dhar, T., et al. (2024). Leveraging AI for sustainable development. <em>Frontiers in AI</em>.',
                'Haenlein, M. & Kaplan, A. (2019). A Brief History of AI. <em>California Management Review</em>, 61(4).',
                'Jobin, A., et al. (2022). Ethical principles for AI in education. <em>EAIT</em>.',
                'You, X., et al. (2023). On the Road to 6G. <em>IEEE COMST</em>, 25(1).',
                'Yurtsever, E., et al. (2020). A Survey of Autonomous Driving. <em>IEEE Access</em>, 8.',
            ],
        },
        {
            id: 2,
            title: 'A Survey on LLM-based Autonomous Agents',
            subtitle: 'Architecture, Collaboration, and Applications',
            date: '2026-03-13',
            type: 'Literature Review',
            lang: '영어',
            words: 4600,
            citations: 15,
            ptcs: 72,
            diagrams: 2,
            author: 'NAVI AI',
            abstract: 'This survey reviews the architecture and collaboration patterns of LLM-based autonomous agents.',
            sections: [
                { heading: '1. Introduction', content: 'Large Language Models (LLMs) have transformed the landscape of artificial intelligence...' },
                { heading: '2. Agent Architecture', content: 'The typical architecture of an LLM-based agent consists of four modules: Profiling, Memory, Planning, and Action...' },
            ],
            references: [
                'Wang, L., et al. (2023). A Survey on LLM-based Autonomous Agents. arXiv:2308.11432.',
                'Park, J.S., et al. (2023). Generative Agents. arXiv:2304.03442.',
            ],
        },
    ];

    function renderList() {
        document.getElementById('session-list').innerHTML = SESSIONS.map(s => {
            const ptcsClass = s.ptcs >= 80 ? 'tag-ptcs-high' : 'tag-ptcs-mid';
            return `
                <div class="session-card" onclick="showArticle(${s.id})">
                    <h2>${s.title}</h2>
                    <div class="session-meta">
                        <span>📅 ${s.date}</span>
                        <span>📝 ${s.words.toLocaleString()} words</span>
                        <span>📚 ${s.citations} citations</span>
                        <span>🖼️ ${s.diagrams} figures</span>
                    </div>
                    <p style="font-size:14px;color:var(--text-sub);margin-bottom:12px;">${s.abstract}</p>
                    <div class="session-tags">
                        <span class="tag ${ptcsClass}">PTCS ${s.ptcs}%</span>
                        <span class="tag tag-type">${s.type}</span>
                        <span class="tag tag-lang">${s.lang}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    function showArticle(id) {
        const s = SESSIONS.find(x => x.id === id);
        if (!s) return;

        document.getElementById('article-header').innerHTML = `
            <h1>${s.title}</h1>
            ${s.subtitle ? `<p style="font-size:16px;color:var(--text-sub);margin-bottom:12px;">${s.subtitle}</p>` : ''}
            <div class="meta">
                <span>✍️ ${s.author}</span>
                <span>📅 ${s.date}</span>
                <span>📝 ${s.words.toLocaleString()} words</span>
                <span>📚 ${s.citations} citations</span>
                <span class="tag ${s.ptcs >= 80 ? 'tag-ptcs-high' : 'tag-ptcs-mid'}" style="margin-left:4px;">PTCS ${s.ptcs}%</span>
            </div>
        `;

        let body = `<blockquote>${s.abstract}</blockquote>`;
        s.sections.forEach(sec => {
            body += `<h2>${sec.heading}</h2>`;
            const content = sec.content.replace(/\n\n/g, '</p><p>');
            if (content.includes('<h3>') || content.includes('<ul>') || content.includes('<p>')) {
                body += content;
            } else {
                body += `<p>${content}</p>`;
            }
        });

        if (s.references && s.references.length > 0) {
            body += `<div class="references"><h2>참고문헌</h2><ol>${s.references.map(r => `<li>${r}</li>`).join('')}</ol></div>`;
        }

        document.getElementById('article-body').innerHTML = body;
        document.getElementById('list-view').classList.add('hidden');
        document.getElementById('article-view').classList.add('active');
        document.getElementById('back-btn').classList.add('visible');
        window.scrollTo(0, 0);
    }

    function showList() {
        document.getElementById('list-view').classList.remove('hidden');
        document.getElementById('article-view').classList.remove('active');
        document.getElementById('back-btn').classList.remove('visible');
    }

    renderList();
    </script>
</body>
</html>
